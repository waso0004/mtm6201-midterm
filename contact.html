<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
     <!-- Contact Section -->
     <section class="contact-section" id="contact-section">
        <div class="wrapper">
            <h2>Contact Us</h2>
            <div class="contact-info">
                <!-- Send Us a Message Section -->
                <div class="message-form">
                    <h3>Send us a message</h3>
                    <form class="input-form">
                        <div>
                            <label for="fname">Full Name</label><br>
                            <input type="text" name="fname" id="fname" placeholder="Jane">
                        </div>
                        <div>
                            <label for="email">Email</label><br>
                            <input type="email" name="email" id="email" placeholder="janedoe@email.com">
                        </div>
                        <div>
                            <label for="message">Message</label><br>
                            <textarea name="message" id="message" cols="20" rows="10"></textarea>
                        </div>
                        <div>
                            <input type="button" value="Send">
                        </div>
                    </form>
                </div>

                <!-- Hours of Operation Section -->
                <div class="hours">
                    <h3>Hours of operation</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>Days</th>
                                <th>Hours</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>Monday - Friday</td>
                                <td>9 AM - 6 PM</td>
                            </tr>
                            <tr>
                                <td>Saturday - Sunday</td>
                                <td>Closed</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Location Section -->
                <div class="location">
                    <h3>Location</h3>
                    <div class="map">
                        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d5607.981080454781!2d-75.75437718203999!3d45.349003223751595!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x4cce0718cc4a6ad7%3A0xc6cc467725843e2b!2sAlgonquin%20College%20-%20Ottawa%20Campus!5e0!3m2!1sen!2sca!4v1732313232142!5m2!1sen!2sca" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
